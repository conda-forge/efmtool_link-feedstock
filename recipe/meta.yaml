{% set name = "efmtool_link" %}
{% set version = "0.0.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/cnapy-org/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: cab36a0b54d83c812d4b7af7bd7f96c7d34674fa780b82490b81858577564e1c

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python {{ python_min }}
    - jpype1
    - openjdk
    - install-jdk
  run:
    - python >={{ python_min }},<3.11
    - numpy
    - jpype1
    - cobra >=0.26.3
    - psutil
    - scipy
    - openjdk

test:
  imports:
    - efmtool_link
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/cnapy-org/efmtool_link
  license: Apache-2.0
  license_family: MIT
  license_file: LICENSE
  summary: Framework for calling selected functions of efmtool
  doc_url: https://github.com/cnapy-org/efmtool_link
  dev_url: https://github.com/cnapy-org/efmtool_link

extra:
  recipe-maintainers:
    - axelvonkamp
